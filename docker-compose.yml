services:
  dietiestates-db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: DietiEstates25
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  dietiestates-backend:
    build:
      context: ./dietiestates-backend
    volumes:
      - ./dietiestates-backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@dietiestates-db:5432/DietiEstates25
      - JWT_SECRET=supersecret
      - JWT_EXPIRES_IN=7d
      - SESSION_SECRET=dietiestates_session_secret_2025
      - GEOAPIFY_KEY=d563955355f940038bab665e9c538a44
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - dietiestates-db
    restart: unless-stopped

  dietiestates-frontend:
    build:
      context: ./dietiestates-frontend
    volumes:
      - ./dietiestates-frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - dietiestates-backend
    restart: unless-stopped

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:

